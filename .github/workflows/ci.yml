name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Lint
      run: npm run lint
    
    - name: Type check
      run: npm run type-check
    
    - name: Build
      run: npm run build

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build
      run: npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  deploy-test:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Get version from package.json
        id: package_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Test package version: $VERSION"

      - name: Build production
        run: npm run build:prod

      - name: Deploy to Cloudflare R2 (test)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          VERSION: ${{ steps.package_version.outputs.version }}
        run: |
          echo "🧪 Deploying TEST version $VERSION to Cloudflare R2..."
          
          aws s3 cp dist/thred.umd.js \
            s3://thred-static/thred-track-test-v$VERSION.js \
            --endpoint-url $R2_ENDPOINT \
            --cache-control "public, max-age=3600" \
            --content-type "application/javascript"
          
          aws s3 cp dist/thred.umd.js \
            s3://thred-static/thred-track-test.js \
            --endpoint-url $R2_ENDPOINT \
            --cache-control "public, max-age=60" \
            --content-type "application/javascript"
          
          aws s3 cp dist/thred.umd.js.map \
            s3://thred-static/thred-track-test-v$VERSION.js.map \
            --endpoint-url $R2_ENDPOINT \
            --cache-control "public, max-age=3600" \
            --content-type "application/json"
          
          echo "✅ Deployed test build to R2:"
          echo "   - thred-track-test-v$VERSION.js"
          echo "   - thred-track-test.js"

      - name: Publish to NPM (test)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ steps.package_version.outputs.version }}
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.name = '@thred-apps/thred-track-test';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm publish --access public --tag test
          echo "✅ Published @thred-apps/thred-track-test@$VERSION to NPM"

      - name: Test deployment summary
        env:
          VERSION: ${{ steps.package_version.outputs.version }}
        run: |
          echo "## 🧪 Test Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Version: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Cloudflare R2 (test)" >> $GITHUB_STEP_SUMMARY
          echo "- Versioned: \`thred-track-test-v$VERSION.js\`" >> $GITHUB_STEP_SUMMARY
          echo "- Latest: \`thred-track-test.js\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### NPM (test)" >> $GITHUB_STEP_SUMMARY
          echo "- Package: \`@thred-apps/thred-track-test@$VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "- Install: \`npm install @thred-apps/thred-track-test@test\`" >> $GITHUB_STEP_SUMMARY
