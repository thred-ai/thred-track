name: Deploy to R2 Only

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-r2:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Get version from package.json
        id: package_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Build production
        run: npm run build:prod

      - name: Deploy to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          VERSION: ${{ steps.package_version.outputs.version }}
        run: |
          echo "🚀 Deploying version $VERSION to Cloudflare R2..."
          
          # Upload versioned file
          aws s3 cp dist/thred.umd.js \
            s3://thred-static/thred-track-v$VERSION.js \
            --endpoint-url $R2_ENDPOINT \
            --acl public-read \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/javascript"
          
          # Upload as latest
          aws s3 cp dist/thred.umd.js \
            s3://thred-static/thred-track.js \
            --endpoint-url $R2_ENDPOINT \
            --acl public-read \
            --cache-control "public, max-age=3600" \
            --content-type "application/javascript"
          
          # Upload source map
          aws s3 cp dist/thred.umd.js.map \
            s3://thred-static/thred-track-v$VERSION.js.map \
            --endpoint-url $R2_ENDPOINT \
            --acl public-read \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/json"
          
          echo "✅ Deployed successfully!"
