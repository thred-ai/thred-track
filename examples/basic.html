<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thred SDK - Basic Example</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      line-height: 1.6;
    }
    h1 { color: #333; }
    form {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
    }
    label {
      display: block;
      margin: 15px 0 5px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 16px;
    }
    button {
      background: #007bff;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
    }
    button:hover {
      background: #0056b3;
    }
    .info {
      background: #e7f3ff;
      padding: 15px;
      border-radius: 4px;
      margin: 20px 0;
      border-left: 4px solid #007bff;
    }
    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 4px;
      background: #f8f9fa;
    }
  </style>
</head>
<body>
  <h1>Thred SDK - Basic Example</h1>
  
  <div class="info">
    <strong>Testing Instructions:</strong>
    <ul>
      <li>Add <code>?utm_source=chatgpt</code> to the URL to simulate ChatGPT referral</li>
      <li>Open browser console to see debug logs</li>
      <li>Use browserKey: <code>751fe47a-d4f5-496a-ba9c-fb298c281e8a</code></li>
    </ul>
  </div>

  <form id="form">
    <label>
      Name:
      <input type="text" name="name" value="Test User" required>
    </label>

    <label>
      Email:
      <input type="email" name="email" value="test@example.com" required>
    </label>

    <label>
      Company:
      <input type="text" name="company" value="Test Company">
    </label>

    <button type="submit">Submit Lead</button>
  </form>

  <div class="status" id="status">
    SDK Status: <span id="sdk-status">Loading...</span><br>
    Fingerprint: <span id="fingerprint">-</span><br>
    From ChatGPT: <span id="chatgpt-status">-</span>
  </div>

  <!-- Load SDK from CDN or local build -->
  <script src="../dist/thred-track.umd.js?browserKey=751fe47a-d4f5-496a-ba9c-fb298c281e8a"></script>

  <script>
    // Wait for SDK to initialize
    setTimeout(() => {
      if (window.Thred) {
        document.getElementById('sdk-status').textContent = 'Initialized ✓';
        document.getElementById('fingerprint').textContent = window.Thred.getFingerprint() || 'Not available';
        document.getElementById('chatgpt-status').textContent = window.Thred.isFromChatGPT() ? 'Yes ✓' : 'No ✗';
      } else {
        document.getElementById('sdk-status').textContent = 'Not loaded ✗';
      }
    }, 1000);

    // Form submission handler (SDK auto-tracks this)
    document.getElementById('form').addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Form submitted! Check console for Thred tracking logs.');
    });
  </script>
</body>
</html>
